          - "**Exchange at ETH Zürich** (Spring 2020): Bayesian multi-task learning for low-resource, few-shot NLP"
          - '**Exchange at EPFL** (Spring 2018): B.Sc. thesis at the Laboratory of Intelligent Systems: "*Middleware for transportation drone communication*" in C++ (DroneCore/MAVSDK).'

    projects:
      - name: Hybrid Information Retrieval System
        summary: "On-premise, privacy-first document retrieval system for sensitive data environments"
        highlights:
          - "Fully air-gapped deployment on **K8S** with **vLLM**-served Qwen 3.5 or Gemma 4, hybrid sparse **Elasticsearch** + dense **Qdrant** retrieval with reranking, **FastAPI** backend, **PostgreSQL**, and **React** frontend + SSO where no data leaves the infrastructure."

