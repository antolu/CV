  sections:
    about:
      # - "**Engineering Physicist, Machine Learning Engineer, Software Engineer.**"
      # - "**Solving complex and interdisciplinary problems that matter.**"
      - Builds solutions to problems that don't fit into one discipline. ML modelling, systems infrastructure, and full-stack development are tools in the same toolbox, applied across the full lifecycle from domain, modelling to production deployment. Picks up new domains fast and prefers problems that cross disciplinary boundaries.
      # - "Researching real-world ML solutions (NNs, LLMs, RAG, hybrid IR), building and maintaining infrastructure out of personal interest: systems administration, DevOps, and full-stack web development. Delivering maintainable self-contained solutions across disciplines, from prototype to production. Eager to learn, and picking up new fields fast when the problem demands it."
      # - "Built on a foundation of Engineering Physics and an M.Sc. in Machine Learning. Designing and training large neural networks across computer vision for fault detection, time series analysis for physics, and language models, deploying them as full-stack, end-to-end production systems. Building and maintaining infrastructure out of personal interest: homelabbing, systems administration, DevOps, and full-stack web development with SSO auth. Delivering self-contained solutions across disciplines, from prototype to production. Eager to learn, and picking up new fields fast when the problem demands it."

    experience:
      - company: CERN
        position: Doctoral Research Engineer
        start_date: 2023-02
        end_date: present
        location: Geneva, Switzerland
        highlights:
          - "Designed, trained, and fine-tuned sequence models (**Transformers**, **LSTMs**) for high-accuracy modelling of magnetic hysteresis and eddy currents in the CERN SPS, achieving relative precision of **1×10⁻⁵** for feed-forward control to increase machine availability and operational efficiency."
          - "Integrated trained models into CERN's accelerator control system for real-time inference, building end-to-end data pipelines and monitoring on top of CERN's internal control infrastructure; **Java**, **Python**, **PyTorch**, **W&B**, **MLflow**, GitLab CI/CD."

      - company: Swiss Federal Railways, SBB CFF FFS
        position: Machine Learning Engineer (Master Thesis)
        start_date: 2022-02-01
        end_date: 2022-08-31
        location: Bern, Switzerland
        highlights:
          - "Developed a self-supervised + CNN image classification pipeline for automated defect detection in rail joint images; achieved **77% recall and precision** on sparse, imbalanced data, exceeding human inspector baseline; **TensorFlow 2**."

      - company: CERN
        position: Scientific Computing Intern (Technical Student)
        start_date: 2020-10-01
        end_date: 2021-11-30
        location: Geneva, Switzerland
        highlights:
          - "Automated **longitudinal phase space tomography** in the PS Booster for real-time beam performance and stability analysis, from raw digitizer data acquisition to **PyQt** GUIs; led development of the [longitudinal-tomography](https://github.com/phasespacetomography/longitudinal-tomography) **Python package** with **C++/pybind11**, **OpenMP**, and full CI/CD pipeline."

      # - company: KTH Royal Institute of Technology
      #   position: AI Teaching Assistant
      #   start_date: 2019-08
      #   end_date: 2023-01
      #   location: Stockholm, Sweden
      #   highlights:
      #     - Examining TA for 5 rounds of the AI course (500 students/round), conducting oral exams and covering HMMs, search, logic, planning, and reinforcement learning. Developed and graded programming assignments.

      - company: CERN
        position: Summer Student
        start_date: 2019-06-03
        end_date: 2019-08-31
        location: Geneva, Switzerland
        highlights:
          - "Built CI/CD pipeline from scratch on GitLab for the LHCb DIRAC distributed computing middleware, automating testing and release to eliminate manual deployment overhead across a large-scale grid system. Stack: Docker, bash, Linux."

    education:
      - institution: TU Wien
        area: Engineering Physics / Machine Learning
        degree: Doctor of Technical Sciences
        start_date: 2022-12
