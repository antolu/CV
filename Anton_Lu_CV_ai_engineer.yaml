        position: Summer Student
        start_date: 2019-06-03
        end_date: 2019-08-31
        location: Geneva, Switzerland
        highlights:
          - "Built **CI/CD pipeline** from scratch on GitLab for integration testing and deployment for the **LHCb DIRAC** distributed computing middleware, automating testing and release to eliminate manual deployment overhead across a large-scale grid system. Stack: **Docker**, bash, Python, **Linux**."

