  sections:
    about:
      # - "**Engineering Physicist, Machine Learning Engineer, Software Engineer.**"
      # - "**Solving complex and interdisciplinary problems that matter.**"
      - I build solutions to problems that don't fit into one discipline. ML modelling, systems infrastructure, and full-stack development are tools in the same toolbox, applied across the full lifecycle from domain, modelling to production deployment. I pick up new domains fast and prefer problems that cross disciplinary boundaries.
      # - "Researching real-world ML solutions (NNs, LLMs, RAG, hybrid IR), building and maintaining infrastructure out of personal interest: systems administration, DevOps, and full-stack web development. Delivering maintainable self-contained solutions across disciplines, from prototype to production. Eager to learn, and picking up new fields fast when the problem demands it."
      # - "Built on a foundation of Engineering Physics and an M.Sc. in Machine Learning. Designing and training large neural networks across computer vision for fault detection, time series analysis for physics, and language models, deploying them as full-stack, end-to-end production systems. Building and maintaining infrastructure out of personal interest: homelabbing, systems administration, DevOps, and full-stack web development with SSO auth. Delivering self-contained solutions across disciplines, from prototype to production. Eager to learn, and picking up new fields fast when the problem demands it."

    projects:
      - name: "Harmony: On-Premise Agentic Information Retrieval"
        summary: "Privacy-first, containerized, on-premise LLM knowledge assistant, from data ingestion to hybrid search and multi-agent retrieval and refinement loops."
        highlights:
          - "Designed a **multi-agent pipeline** with K-round refinement: planner, parallel searchers, synthesizer, and a critic agent that triggers another round if the answer is weak. Validated answer quality against known-answer queries."
          - "Built the underlying retrieval infrastructure with hybrid **Elasticsearch** (keyword) + **Qdrant** (semantic/vector) search with reranking, models served locally via containerized **vLLM**/**Ollama** or routed to remote providers."
          - "Exposed search and tool access to agents via **MCP** server connectors, and ingested external sources through pluggable data connectors such as **Scrapy** crawlers, filesystem readers, and document parsers, with incremental re-indexing."
          - "Secured the multi-user spolution with **Keycloak**-backed OIDC SSO, role-based **ACL** for authorization, and a dedicated **audit log** of user actions, and each user gets isolated conversation history and model selection."
          - "Shipped as a containerized, multi-service system (**FastAPI**, **PostgreSQL**, **Redis**, **React** frontend), deployed on **Minikube**, with CI-tested coverage and Alembic-managed schema migrations; [github.com/antolu/harmony](https://github.com/antolu/harmony)."

      - name: "Dragonglass: Agentic Search over Obsidian Note Vaults"
        summary: "Local-first, provider-agnostic agentic retrieval assistant for personal knowledge bases, running on small local models such as **Qwen 9B**; [github.com/antolu/dragonglass](https://github.com/antolu/dragonglass)"
        highlights:
          - "Implemented an MCP-native agent loop (**FastMCP**, async WebSocket/SSE) combining keyword and vector search over large note collections, with a **TypeScript** Obsidian plugin serving as the embedding and retrieval backend."

    experience:
      - company: CERN
        position: Doctoral Research Engineer
        start_date: 2023-02
        end_date: present
        location: Geneva, Switzerland
        summary: "Designed, trained, and fine-tuned sequence models (**Transformers**, **LSTMs**) for high-accuracy modelling of magnetic hysteresis and eddy currents in the CERN SPS with experts from across ATS, achieving relative precision of **1×10⁻⁵** for feed-forward control; integrated trained models into the accelerator control system stack for cycle-by-cycle corrections, building end-to-end data pipelines and monitoring with **Java**, **Python**, **PyTorch**, **W&B**, **MLflow**, GitLab CI/CD."
        highlights:
          - "Integrated with **LSA** and middleware for multiplexed settings and acquisition, and used **UCAP** for containerized real-time inference and testing; actively contributed to the development of **PyDA** and **NXCALS** through hands-on feedback and bug reports, with brief hands-on experience with **FESA** for real-time communication to SPS mains FGCs."
          - "Packaged and deployed my models and tools as typed, linted, and tested Python packages on **Acc-Py** (including on the TN), built for reusability and long-term maintainability. Separately developed section-wide Python DevOps tooling adopted by others, including prototyping **Renovate** for automated dependency management across the Acc-Py pipeline."
          - "Designed, built, and deployed a prototype [mobility web application](https://mobility.app.cern.ch) on CERN **OpenShift**, a publicly-exposed internal service, with CERN's SCE campus mobility team."

      - company: Swiss Federal Railways, SBB CFF FFS
        position: Machine Learning Engineer (Master Thesis)
        start_date: 2022-02-01
        end_date: 2022-08-31
        location: Bern, Switzerland
        summary: "Developed a self-supervised + CNN image classification pipeline for automated defect detection in rail joint images; achieved **77% recall and precision** on sparse, imbalanced data, exceeding human inspector baseline; **TensorFlow 2**."

      - company: CERN
        position: Scientific Computing Intern (Technical Student)
        start_date: 2020-10-01
        end_date: 2021-11-30
        location: Geneva, Switzerland
        summary: "Automated **longitudinal phase space tomography** in the PS Booster for real-time beam performance and stability analysis, from raw digitizer data acquisition to **PyQt** GUIs; led development of the [longitudinal-tomography](https://github.com/phasespacetomography/longitudinal-tomography) **Python package** with **C++/pybind11**, **OpenMP**, and full CI/CD pipeline."
        highlights:
          - "Developed **FESA** composite class with **OASIS**, deployed processing on **UCAP**, and frontend in acc-widgets PyQt app for the CCC."

      # - company: KTH Royal Institute of Technology
